# NGINX Classic Baseline Configuration
# Run with: nginx -c $(pwd)/nginx_classic.conf

worker_processes 1;
daemon off;
error_log nginx_error.log warn;
pid nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    access_log off;
    sendfile on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    upstream backend_sum {
        server unix:/tmp/faas_sum.sock;
        keepalive 32;
    }

    server {
        listen 8444 ssl;
        server_name sum.faas.local;

        ssl_certificate     server-cert.pem;
        ssl_certificate_key server-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /sum {
            proxy_pass http://backend_sum;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;
        }
    }
}
