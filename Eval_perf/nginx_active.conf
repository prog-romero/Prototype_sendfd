user tchiaze;
worker_processes 4;
pid /tmp/nginx.pid;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
}

http {
    access_log off;
    error_log /home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/nginx_error.log info;
    sendfile on;
    keepalive_timeout 65;
    keepalive_requests 10000;

# Auto-generated upstream configuration for 10 workers
# keepalive = 256 (scales with number of workers)
upstream backend {
    keepalive 256;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_0_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_1_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_2_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_3_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_4_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_5_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_6_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_7_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_8_proxy.sock max_fails=0;
    server unix:/home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/Eval_perf/worker_9_proxy.sock max_fails=0;
}

    server {
        listen 8445 ssl backlog=16384;
        ssl_certificate /home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/libtlspeek/certs/server.crt;
        ssl_certificate_key /home/tchiaze/Master2_ACS_SUPAERO_ISAE/Stage/Prototype_sendfd/libtlspeek/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /direct {
            default_type application/json;
            return 200 '{"mode":"direct","result":"ok"}\n';
        }

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;
        }
    }
}
